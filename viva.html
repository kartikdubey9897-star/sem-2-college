<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Factorial Calculator</h2>

        <input type="number" id="num" placeholder="Enter a number">

        <br>

        <button onclick="calculateFactorial()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateFactorial() {
            let n = parseInt(document.getElementById("num").value);

            if (isNaN(n) || n < 0) {
                document.getElementById("result").innerHTML =
                    "Please enter a non-negative number";
                return;
            }

            let fact = 1;

            for (let i = 1; i <= n; i++) {
                fact *= i;
            }

            document.getElementById("result").innerHTML =
                "Factorial of " + n + " = " + fact;
        }
    </script>

</body>
</html>
