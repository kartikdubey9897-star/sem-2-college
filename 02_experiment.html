<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TechStore</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#ececec;
}

.navbar{
    background:linear-gradient(to right,#1d2430,#20263a);
}

.navbar-brand,
.nav-link{
    color:white !important;
}

.card img{
    height:200px;
    object-fit:contain;
    padding:15px;
}

.footer{
    background:linear-gradient(to right,#1d2430,#20263a);
    color:white;
    text-align:center;
    padding:15px;
    margin-top:50px;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">TechStore</a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Product Section -->
<div class="container my-5">
    <div class="row g-4">

        <!-- Laptop -->
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600"
                     class="card-img-top" alt="Laptop">

                <div class="card-body">
                    <h3 class="card-title">Laptop</h3>
                    <p class="card-text">High performance laptop</p>

                    <h5>
                        ₹50,000
                        <span class="badge bg-success">New</span>
                    </h5>

                    <button class="btn btn-primary mt-2">
                        View Details
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile -->
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600"
                     class="card-img-top" alt="Mobile">

                <div class="card-body">
                    <h3 class="card-title">Mobile</h3>
                    <p class="card-text">Latest smartphone</p>

                    <h5>
                        ₹30,000
                        <span class="badge bg-danger">Sale</span>
                    </h5>

                    <button class="btn btn-primary mt-2">
                        View Details
                    </button>
                </div>
            </div>
        </div>

        <!-- Headphones -->
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
                     class="card-img-top" alt="Headphones">

                <div class="card-body">
                    <h3 class="card-title">Headphones</h3>
                    <p class="card-text">Noise cancelling</p>

                    <h5>
                        ₹5,000
                        <span class="badge bg-success">New</span>
                    </h5>

                    <button class="btn btn-primary mt-2">
                        View Details
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 TechStore | Follow us on social media
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
